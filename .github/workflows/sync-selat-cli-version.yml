name: Sync selat-cli version

# Keeps the @selat-ai/selat-cli version markers in this repo (SKILL.md +
# ensure-runner.sh comments) in step with the latest published CLI.
#
# selat-cli is published from SELAT-AI/selat-cli, a SEPARATE repo, and a repo can't
# natively subscribe to another repo's release events without a cross-repo token. So we
# POLL: on a schedule we read npm's `latest` dist-tag for @selat-ai/selat-cli, rewrite
# the version markers, and open a PR if anything drifted. Nothing here auto-merges — two
# of the markers are "verified against vX" claims, and the PR review IS the re-verification.
#
# Manual run: Actions tab -> "Sync selat-cli version" -> Run workflow (optionally pin a
# version). Run it right after publishing a release to skip the poll latency.
#
# REQUIREMENT: Settings -> Actions -> General -> Workflow permissions must have
# "Allow GitHub Actions to create and approve pull requests" enabled, or PR creation 403s.

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      version:
        description: 'Target @selat-ai/selat-cli version (e.g. 0.8.1). Blank = npm latest.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-selat-cli-version
  cancel-in-progress: false

jobs:
  sync:
    # Don't run on forks.
    if: github.repository == 'SELAT-AI/selat-plugins'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve target version
        id: resolve
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ -z "$VER" ]; then
            VER="$(npm view @selat-ai/selat-cli version)"
          fi
          VER="${VER#v}"
          if ! printf '%s' "$VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::could not resolve a valid selat-cli version (got '$VER')"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Target selat-cli version: $VER"

      - name: Apply version sync
        run: .github/scripts/sync-selat-cli-version.sh "${{ steps.resolve.outputs.version }}"

      - name: Open PR if references drifted
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: ci/sync-selat-cli-${{ steps.resolve.outputs.version }}
          delete-branch: true
          commit-message: "docs: sync selat-cli references to ${{ steps.resolve.outputs.version }}"
          title: "docs: sync selat-cli references to ${{ steps.resolve.outputs.version }}"
          body: |
            Automated sync — the published `@selat-ai/selat-cli` `latest` dist-tag is
            **${{ steps.resolve.outputs.version }}**, and the version markers in this repo
            were behind. This PR bumps them via `.github/scripts/sync-selat-cli-version.sh`.

            Files touched: `plugins/selat/skills/selat-discovery/SKILL.md`,
            `plugins/selat/hooks-handlers/ensure-runner.sh` (doc/comment markers only —
            the runtime already tracks `latest` via `CLI_SPEC`, so install behavior is
            unchanged).

            ⚠️ **Review before merging:** two of these are *"verified against
            @selat-ai/selat-cli@X"* claims. This bot did **not** re-verify the documented
            command/flag surface against ${{ steps.resolve.outputs.version }} — please
            confirm the SKILL.md command reference still matches the new CLI (e.g. any new
            subcommands or changed flags) before merging.

            🤖 Generated by the `sync-selat-cli-version` workflow.
